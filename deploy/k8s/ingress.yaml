apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viksitnetra-ingress
  namespace: viksitnetra-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - viksitnetra.gov.in
    - graph.viksitnetra.gov.in
    secretName: viksitnetra-tls
  rules:
  - host: viksitnetra.gov.in
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: viksitnetra-backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: viksitnetra-frontend-service
            port:
              number: 80
