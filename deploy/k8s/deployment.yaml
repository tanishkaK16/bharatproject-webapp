apiVersion: apps/v1
kind: Deployment
metadata:
  name: viksitnetra-backend
  namespace: viksitnetra-prod
  labels:
    app.kubernetes.io/name: viksitnetra-backend
    app.kubernetes.io/part-of: viksitnetra
    app.kubernetes.io/tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: viksitnetra-backend
  template:
    metadata:
      labels:
        app: viksitnetra-backend
        app.kubernetes.io/name: viksitnetra-backend
        app.kubernetes.io/part-of: viksitnetra
    spec:
      containers:
      - name: viksitnetra-api
        image: index.docker.shakti.yotta.in/gov/viksitnetra-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: viksitnetra-config
        env:
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: viksitnetra-secrets
              key: neo4j-password
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"  # NVIDIA H100/L40S on Shakti sovereign GPU pool
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: viksitnetra-frontend
  namespace: viksitnetra-prod
  labels:
    app.kubernetes.io/name: viksitnetra-frontend
    app.kubernetes.io/part-of: viksitnetra
    app.kubernetes.io/tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: viksitnetra-frontend
  template:
    metadata:
      labels:
        app: viksitnetra-frontend
        app.kubernetes.io/name: viksitnetra-frontend
        app.kubernetes.io/part-of: viksitnetra
    spec:
      containers:
      - name: viksitnetra-ui
        image: index.docker.shakti.yotta.in/gov/viksitnetra-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
