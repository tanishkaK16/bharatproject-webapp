apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: viksitnetra-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "8Gi"
            cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: viksitnetra-prod
spec:
  selector:
    app: redis
  ports:
  - port: 6379
