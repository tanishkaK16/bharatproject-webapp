services:
  # Backend API
  - type: web
    name: viksitnetra-backend
    env: docker
    dockerfilePath: ./deploy/docker/Dockerfile.backend
    region: singapore
    plan: free
    envVars:
      - key: PORT
        value: 8000
      # Provide mock Neo4j URIs for the free tier demo or link to an AuraDB instance
      - key: NEO4J_URI
        value: neo4j+s://demo.neo4j.com:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: password
      - key: CORS_ORIGINS
        value: "*"

  # Frontend Static Server
  - type: web
    name: viksitnetra-frontend
    env: docker
    dockerfilePath: ./deploy/docker/Dockerfile.frontend
    region: singapore
    plan: free
    envVars:
      - key: PORT
        value: 80
