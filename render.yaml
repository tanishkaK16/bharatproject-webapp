services:
  # Single unified service: FastAPI serves both API + Frontend
  - type: web
    name: viksitnetra
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: NEO4J_URI
        value: bolt://localhost:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: demo_password
      - key: REDIS_URL
        value: redis://localhost:6379/0
