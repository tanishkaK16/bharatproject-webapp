name: Production Deploy to Yotta Shakti

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Yotta Shakti Container Registry
        uses: docker/login-action@v2
        with:
          registry: index.docker.shakti.yotta.in
          username: ${{ secrets.YOTTA_USERNAME }}
          password: ${{ secrets.YOTTA_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: deploy/docker/Dockerfile.backend
          push: true
          tags: index.docker.shakti.yotta.in/gov/viksitnetra-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: deploy/docker/Dockerfile.frontend
          push: true
          tags: index.docker.shakti.yotta.in/gov/viksitnetra-frontend:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set Kubernetes Context for Yotta Shakti
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.YOTTA_KUBECONFIG }}
          
      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f deploy/k8s/configmap.yaml
          kubectl apply -f deploy/k8s/redis.yaml
          kubectl apply -f deploy/k8s/neo4j.yaml
          kubectl apply -f deploy/k8s/deployment.yaml
          kubectl apply -f deploy/k8s/service.yaml
          kubectl apply -f deploy/k8s/ingress.yaml
          kubectl apply -f deploy/k8s/hpa.yaml
          kubectl rollout restart deployment viksitnetra-backend -n viksitnetra-prod
          kubectl rollout restart deployment viksitnetra-frontend -n viksitnetra-prod
